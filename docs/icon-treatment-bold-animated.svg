<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560">
  <defs>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#888d9b"/>
      <stop offset="0.52" stop-color="#5a6070"/>
      <stop offset="1" stop-color="#252a36"/>
    </linearGradient>
    <radialGradient id="purple" cx="36%" cy="22%" r="96%">
      <stop offset="0" stop-color="#9d75ff"/>
      <stop offset="0.42" stop-color="#5a00ff"/>
      <stop offset="1" stop-color="#210069"/>
    </radialGradient>
    <filter id="glow" x="-90%" y="-90%" width="280%" height="280%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif; fill:#f8f5ff; }
      .note { fill:#d8d1e8; font-size:15px; }
      .caption { font-size:22px; font-weight:720; }
      .small { fill:#bbb4cb; font-size:12px; }
      .tile { fill:rgba(255,255,255,.075); stroke:rgba(255,255,255,.15); stroke-width:1; }
      .whiteStroke { stroke:#fff; fill:none; stroke-linecap:round; stroke-linejoin:round; }
      .purpleSurface { fill:url(#purple); filter:url(#glow); }
      .hover { animation:hover 1.55s ease-in-out infinite; transform-box:fill-box; transform-origin:center; }
      @keyframes hover { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-5px); } }
      .pulse { animation:pulse 1.55s ease-out infinite; transform-origin:130px 190px; }
      @keyframes pulse { 0% { transform:scale(.82); opacity:.42; } 72% { transform:scale(1.34); opacity:.05; } 100% { transform:scale(1.34); opacity:0; } }
      .barA { animation:barA .86s ease-in-out infinite; transform-box:fill-box; transform-origin:center; }
      .barB { animation:barB .86s ease-in-out infinite; transform-box:fill-box; transform-origin:center; }
      .barC { animation:barC .86s ease-in-out infinite; transform-box:fill-box; transform-origin:center; }
      @keyframes barA { 0%,100% { transform:scaleY(.58); } 50% { transform:scaleY(1.04); } }
      @keyframes barB { 0%,100% { transform:scaleY(1.18); } 50% { transform:scaleY(.68); } }
      @keyframes barC { 0%,100% { transform:scaleY(.78); } 50% { transform:scaleY(1.2); } }
      .shutter { animation:shutter 2.2s ease-in-out infinite; transform-origin:130px 190px; }
      @keyframes shutter { 0%,100% { transform:rotate(0deg) scale(1); opacity:1; } 50% { transform:rotate(12deg) scale(1.05); opacity:.92; } }
    </style>
  </defs>

  <rect width="1280" height="560" fill="#181a24"/>
  <rect width="1280" height="96" fill="url(#bar)"/>
  <text x="54" y="58" font-size="30" font-weight="760">Aggressive active-state menu-bar treatments</text>
  <text x="54" y="80" class="note">More aggressive than option 3: compact purple privacy badge, oversized white mic, live dot, pulse ring, and thick white level bars.</text>

  <g transform="translate(54 126)">
    <rect width="260" height="360" rx="22" class="tile"/>
    <text x="24" y="45" class="caption">A. System privacy beacon</text>
    <text x="24" y="72" class="note">Current runtime direction</text>
    <circle cx="130" cy="190" r="104" fill="#5a00ff" opacity=".54" filter="url(#glow)" class="pulse"/>
    <g class="hover">
      <rect x="-24" y="124" width="314" height="132" rx="66" fill="#fff" filter="url(#glow)"/>
      <rect x="-8" y="139" width="222" height="102" rx="51" class="purpleSurface"/>
      <circle cx="100" cy="190" r="68" fill="#fff"/>
      <circle cx="100" cy="190" r="62" fill="#fff" opacity=".38"/>
      <g stroke-width="6">
        <rect x="79" y="149" width="44" height="70" rx="22" fill="#220075"/>
        <path d="M64 181 C64 236, 138 236, 138 181" fill="none" stroke="#220075" stroke-linecap="round" stroke-linejoin="round" stroke-width="10"/>
        <path d="M101 235 L101 248" fill="none" stroke="#220075" stroke-linecap="round" stroke-linejoin="round" stroke-width="9"/>
        <path d="M72 248 L130 248" fill="none" stroke="#220075" stroke-linecap="round" stroke-linejoin="round" stroke-width="9"/>
      </g>
      <circle cx="166" cy="154" r="23" fill="#fff" stroke="#5a00ff" stroke-width="7"/>
      <line x1="167" y1="158" x2="167" y2="224" stroke="#fff" stroke-width="5" stroke-linecap="round" opacity=".35"/>
      <g stroke="#fff" stroke-width="20" stroke-linecap="round">
        <line x1="184" y1="235" x2="184" y2="145" class="barA"/>
        <line x1="214" y1="235" x2="214" y2="120" class="barB"/>
        <line x1="244" y1="235" x2="244" y2="139" class="barC"/>
        <line x1="274" y1="235" x2="274" y2="165" class="barA"/>
        <line x1="304" y1="235" x2="304" y2="130" class="barB"/>
      </g>
    </g>
    <text x="24" y="302" class="small">Maximum visibility: white owns silhouette, mic island, live dot, and waveform; purple stays as near-black brand core.</text>
  </g>

  <g transform="translate(358 126)">
    <rect width="260" height="360" rx="22" class="tile"/>
    <text x="24" y="45" class="caption">B. White mic badge</text>
    <text x="24" y="72" class="note">Closest to macOS input status</text>
    <circle cx="130" cy="190" r="84" fill="#5a00ff" opacity=".42" filter="url(#glow)" class="pulse"/>
    <g class="hover">
      <circle cx="130" cy="190" r="72" class="purpleSurface" stroke="#fff" stroke-width="8"/>
      <g stroke-width="7">
        <rect x="108" y="131" width="44" height="78" rx="22" class="whiteStroke"/>
        <path d="M88 178 C88 220, 172 220, 172 178" class="whiteStroke"/>
        <path d="M130 220 L130 248" class="whiteStroke"/>
        <path d="M104 248 L156 248" class="whiteStroke"/>
      </g>
    </g>
    <text x="24" y="302" class="small">Very legible as recording. Less unique to Command.</text>
  </g>

  <g transform="translate(662 126)">
    <rect width="260" height="360" rx="22" class="tile"/>
    <text x="24" y="45" class="caption">C. Camera capture</text>
    <text x="24" y="72" class="note">Screenshot/capture-specific state</text>
    <circle cx="130" cy="190" r="84" fill="#5a00ff" opacity=".42" filter="url(#glow)" class="pulse"/>
    <g class="hover">
      <rect x="55" y="128" width="150" height="124" rx="34" class="purpleSurface" stroke="#fff" stroke-width="8"/>
      <g stroke-width="7">
        <path d="M79 164 H100 L112 146 H148 L160 164 H181" class="whiteStroke"/>
        <rect x="79" y="164" width="102" height="62" rx="18" class="whiteStroke"/>
        <circle cx="130" cy="195" r="20" class="whiteStroke shutter"/>
      </g>
    </g>
    <text x="24" y="302" class="small">Strong capture metaphor. Too specific for dictation as default.</text>
  </g>

  <g transform="translate(966 126)">
    <rect width="260" height="360" rx="22" class="tile"/>
    <text x="24" y="45" class="caption">D. Giant waveform</text>
    <text x="24" y="72" class="note">Most “active work”</text>
    <circle cx="130" cy="190" r="84" fill="#5a00ff" opacity=".42" filter="url(#glow)" class="pulse"/>
    <g class="hover">
      <rect x="52" y="132" width="156" height="116" rx="42" class="purpleSurface" stroke="#fff" stroke-width="8"/>
      <g stroke-width="13">
        <line x1="90" y1="224" x2="90" y2="157" class="whiteStroke barA"/>
        <line x1="117" y1="224" x2="117" y2="136" class="whiteStroke barB"/>
        <line x1="144" y1="224" x2="144" y2="150" class="whiteStroke barC"/>
        <line x1="171" y1="224" x2="171" y2="172" class="whiteStroke barA"/>
      </g>
    </g>
    <text x="24" y="302" class="small">Highest motion visibility. Least subtle.</text>
  </g>
</svg>
