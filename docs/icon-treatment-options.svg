<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="menubar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7d8292"/>
      <stop offset="0.46" stop-color="#565b6d"/>
      <stop offset="1" stop-color="#2b2f3e"/>
    </linearGradient>
    <radialGradient id="purpleBg" cx="35%" cy="25%" r="85%">
      <stop offset="0" stop-color="#b99cff"/>
      <stop offset="0.55" stop-color="#7028d7"/>
      <stop offset="1" stop-color="#3d1682"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif; fill: #f7f3ff; }
      .caption { font-size: 22px; font-weight: 650; }
      .note { font-size: 15px; fill: #d8d1e8; }
      .bar { fill: url(#menubar); }
      .tile { fill: rgba(255,255,255,0.07); stroke: rgba(255,255,255,0.14); stroke-width: 1; }
      .purple { stroke: #bda2ff; fill: none; }
      .deepPurple { stroke: #7028d7; fill: none; }
      .whiteStroke { stroke: #ffffff; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .whiteFill { fill: #ffffff; }
      .lavenderFill { fill: #d8c7ff; }
    </style>
  </defs>

  <rect width="1280" height="640" fill="#181a24"/>
  <rect x="0" y="0" width="1280" height="92" class="bar"/>
  <text x="54" y="58" font-size="28" font-weight="720">Command menu-bar icon treatments</text>
  <text x="54" y="80" class="note">White-forward, no black. Mocked on busy dark/translucent menu-bar background.</text>

  <g transform="translate(54 130)">
    <rect width="212" height="430" rx="22" class="tile"/>
    <text x="24" y="46" class="caption">1. White motion</text>
    <text x="24" y="74" class="note">Waveform turns white</text>
    <circle cx="106" cy="202" r="58" fill="rgba(255,255,255,0.05)"/>
    <g filter="url(#softGlow)" stroke-width="8">
      <line x1="72" y1="202" x2="72" y2="178" class="whiteStroke"/>
      <line x1="95" y1="202" x2="95" y2="148" class="whiteStroke"/>
      <line x1="118" y1="202" x2="118" y2="162" class="whiteStroke"/>
      <line x1="141" y1="202" x2="141" y2="186" class="whiteStroke"/>
    </g>
    <path d="M64 269 C88 245, 124 245, 148 269" class="purple" stroke-width="3" opacity="0.65"/>
    <text x="24" y="346" class="note">Most readable. Least brand motion unless glow stays purple.</text>
  </g>

  <g transform="translate(294 130)">
    <rect width="212" height="430" rx="22" class="tile"/>
    <text x="24" y="46" class="caption">2. White + ring</text>
    <text x="24" y="74" class="note">White mark, purple arc</text>
    <circle cx="106" cy="202" r="62" fill="rgba(255,255,255,0.04)"/>
    <path d="M106 140 A62 62 0 0 1 165 222" class="purple" stroke-width="7" stroke-linecap="round" filter="url(#softGlow)"/>
    <g stroke-width="5">
      <ellipse cx="106" cy="202" rx="56" ry="28" transform="rotate(28 106 202)" class="whiteStroke"/>
      <ellipse cx="106" cy="202" rx="56" ry="28" transform="rotate(-28 106 202)" class="whiteStroke"/>
      <circle cx="106" cy="202" r="8" class="whiteFill"/>
    </g>
    <text x="24" y="346" class="note">Best balance. Clear idle mark, active status still branded.</text>
  </g>

  <g transform="translate(534 130)">
    <rect width="212" height="430" rx="22" class="tile"/>
    <text x="24" y="46" class="caption">3. Purple plate</text>
    <text x="24" y="74" class="note">Larger white icon</text>
    <rect x="48" y="144" width="116" height="116" rx="30" fill="url(#purpleBg)"/>
    <g stroke-width="5.5">
      <ellipse cx="106" cy="202" rx="49" ry="24" transform="rotate(28 106 202)" class="whiteStroke"/>
      <ellipse cx="106" cy="202" rx="49" ry="24" transform="rotate(-28 106 202)" class="whiteStroke"/>
      <circle cx="106" cy="202" r="8" class="whiteFill"/>
    </g>
    <text x="24" y="346" class="note">Strongest contrast. More app-icon-like, less subtle.</text>
  </g>

  <g transform="translate(774 130)">
    <rect width="212" height="430" rx="22" class="tile"/>
    <text x="24" y="46" class="caption">4. Two-tone</text>
    <text x="24" y="74" class="note">White + lavender detail</text>
    <circle cx="106" cy="202" r="58" fill="rgba(255,255,255,0.04)"/>
    <g stroke-width="6">
      <ellipse cx="106" cy="202" rx="57" ry="27" transform="rotate(28 106 202)" class="whiteStroke"/>
      <ellipse cx="106" cy="202" rx="57" ry="27" transform="rotate(-28 106 202)" class="purple" opacity="0.95"/>
      <circle cx="106" cy="202" r="8" class="lavenderFill"/>
    </g>
    <text x="24" y="346" class="note">Elegant. Better than purple-only, softer than pure white.</text>
  </g>

  <g transform="translate(1014 130)">
    <rect width="212" height="430" rx="22" class="tile"/>
    <text x="24" y="46" class="caption">5. Pulse plate</text>
    <text x="24" y="74" class="note">White icon, active halo</text>
    <circle cx="106" cy="202" r="70" fill="#7028d7" opacity="0.16"/>
    <circle cx="106" cy="202" r="58" fill="#7028d7" opacity="0.24" filter="url(#softGlow)"/>
    <g stroke-width="5.5">
      <ellipse cx="106" cy="202" rx="56" ry="28" transform="rotate(28 106 202)" class="whiteStroke"/>
      <ellipse cx="106" cy="202" rx="56" ry="28" transform="rotate(-28 106 202)" class="whiteStroke"/>
      <circle cx="106" cy="202" r="8" class="whiteFill"/>
    </g>
    <text x="24" y="346" class="note">Classy active state. Idle can stay plain white.</text>
  </g>
</svg>
